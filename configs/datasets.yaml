# Dataset Configurations for Experiments

datasets:
  # Math Reasoning
  gsm8k:
    name: "GSM8K"
    description: "Grade school math word problems"
    task_type: "math_reasoning"
    num_samples: 1319
    metrics:
      - accuracy
      - solve_rate
    source: "openai/gsm8k"
    split: "test"

  math:
    name: "MATH"
    description: "Competition mathematics problems"
    task_type: "math_reasoning"
    num_samples: 5000
    metrics:
      - accuracy
    source: "hendrycks/competition_math"
    split: "test"

  # General Knowledge
  mmlu:
    name: "MMLU"
    description: "Massive Multitask Language Understanding"
    task_type: "multiple_choice"
    num_samples: 14042
    metrics:
      - accuracy
    source: "cais/mmlu"
    split: "test"
    categories:
      - stem
      - humanities
      - social_sciences
      - other

  # Commonsense Reasoning
  hellaswag:
    name: "HellaSwag"
    description: "Commonsense reasoning about everyday events"
    task_type: "multiple_choice"
    num_samples: 10042
    metrics:
      - accuracy
    source: "Rowan/hellaswag"
    split: "validation"

  winogrande:
    name: "WinoGrande"
    description: "Commonsense reasoning with pronouns"
    task_type: "multiple_choice"
    num_samples: 1267
    metrics:
      - accuracy
    source: "winogrande"
    split: "validation"

  # Code Generation
  humaneval:
    name: "HumanEval"
    description: "Code generation from docstrings"
    task_type: "code_generation"
    num_samples: 164
    metrics:
      - pass@1
      - pass@10
    source: "openai/humaneval"
    split: "test"

  mbpp:
    name: "MBPP"
    description: "Mostly Basic Python Problems"
    task_type: "code_generation"
    num_samples: 500
    metrics:
      - pass@1
      - pass@10
    source: "mbpp"
    split: "test"

  # Question Answering
  triviaqa:
    name: "TriviaQA"
    description: "Reading comprehension with trivia questions"
    task_type: "qa"
    num_samples: 9960
    metrics:
      - exact_match
      - f1
    source: "trivia_qa"
    split: "validation"

  natural_questions:
    name: "Natural Questions"
    description: "Real Google search questions"
    task_type: "qa"
    num_samples: 7830
    metrics:
      - exact_match
      - f1
    source: "natural_questions"
    split: "validation"

  # Instruction Following
  alpaca_eval:
    name: "AlpacaEval"
    description: "Instruction-following evaluation"
    task_type: "instruction_following"
    num_samples: 805
    metrics:
      - win_rate
      - length_controlled_win_rate
    source: "tatsu-lab/alpaca_eval"
    split: "test"

  # Reasoning Chains
  arc_challenge:
    name: "ARC-Challenge"
    description: "AI2 Reasoning Challenge (hard)"
    task_type: "multiple_choice"
    num_samples: 1172
    metrics:
      - accuracy
    source: "ai2_arc"
    split: "test"
    subset: "ARC-Challenge"

# Default dataset subsets for quick experiments
quick_eval:
  - gsm8k
  - mmlu
  - humaneval

standard_eval:
  - gsm8k
  - mmlu
  - humaneval
  - hellaswag
  - triviaqa

comprehensive_eval:
  - gsm8k
  - math
  - mmlu
  - humaneval
  - mbpp
  - hellaswag
  - winogrande
  - triviaqa
  - arc_challenge
