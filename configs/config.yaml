# DeepResearch Main Configuration

# Research settings
research_topic: ""  # Set via CLI

# Output directories
output_dir: "data/outputs"
session_dir: "data/sessions"
results_dir: "data/results"

# Pipeline stage toggles
skip_literature_search: false
skip_novelty_check: false

# Execution settings
checkpoint_interval: 10  # Save checkpoint every N samples
max_concurrent_experiments: 3

# Literature search settings
literature:
  max_papers: 50
  search_sources:
    - arxiv
    - semantic_scholar
  embedding_model: "text-embedding-3-small"
  similarity_threshold: 0.85

# API settings
api:
  default_provider: anthropic
  total_budget_usd: 100.0
  parallel_requests: 5
  providers:
    anthropic:
      provider_type: anthropic
      model: "claude-3-5-sonnet-20241022"
      requests_per_minute: 60
      tokens_per_minute: 100000
      cost_per_1k_input: 0.003
      cost_per_1k_output: 0.015
      max_retries: 3
      timeout: 60.0
    openai:
      provider_type: openai
      model: "gpt-4o"
      requests_per_minute: 500
      tokens_per_minute: 150000
      cost_per_1k_input: 0.005
      cost_per_1k_output: 0.015
      max_retries: 3
      timeout: 60.0
    google:
      provider_type: google
      model: "gemini-1.5-pro"
      requests_per_minute: 60
      tokens_per_minute: 100000
      cost_per_1k_input: 0.00125
      cost_per_1k_output: 0.005
      max_retries: 3
      timeout: 60.0

# Figure settings
figure_format: "pdf"  # pdf, png, svg
tikz_enabled: true

# Writing settings
output_format: "latex"  # latex, markdown
