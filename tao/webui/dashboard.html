<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tao Research System</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
/* ── Reset & Base ───────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #FDFAF5;
  --text:      #2C2C2C;
  --accent:    #8B3A3A;
  --success:   #6B8F71;
  --warning:   #C4903D;
  --border:    #E8E0D4;
  --card:      #FFFFFF;
  --muted:     #9A9488;
  --bg-hover:  #F5F0E8;

  --font-heading: Georgia, Palatino, 'Palatino Linotype', serif;
  --font-body:    system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
  --font-mono:    'SF Mono', 'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace;

  --sidebar-w: 220px;
  --header-h:  56px;
  --shadow:    0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-lg: 0 4px 12px rgba(0,0,0,0.08);
  --radius:    6px;
}

html { font-size: 14px; }
body {
  font-family: var(--font-body);
  color: var(--text);
  background: var(--bg);
  line-height: 1.5;
  min-height: 100vh;
}

/* ── Header ─────────────────────────────────────────────────────── */
.header {
  height: var(--header-h);
  background: var(--card);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 24px;
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  box-shadow: var(--shadow);
}
.header h1 {
  font-family: var(--font-heading);
  font-size: 1.25rem;
  font-weight: 600;
  color: var(--accent);
  letter-spacing: 0.02em;
}
.header h1 span {
  font-weight: 400;
  color: var(--muted);
  margin-left: 8px;
  font-size: 0.85rem;
}
.header-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 0.8rem;
  color: var(--muted);
}
.header-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--success);
  display: inline-block;
  animation: pulse-dot 2s ease-in-out infinite;
}
@keyframes pulse-dot {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

/* ── Layout Shell ───────────────────────────────────────────────── */
.shell {
  display: flex;
  margin-top: var(--header-h);
  min-height: calc(100vh - var(--header-h));
}

/* ── Sidebar ────────────────────────────────────────────────────── */
.sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  background: var(--card);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}
.sidebar-header {
  padding: 16px 16px 12px;
  font-family: var(--font-heading);
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  border-bottom: 1px solid var(--border);
}
.project-list {
  flex: 1;
  overflow-y: auto;
}
.project-item {
  padding: 12px 16px;
  cursor: pointer;
  border-left: 3px solid transparent;
  transition: background 0.15s, border-color 0.15s;
}
.project-item:hover { background: var(--bg-hover); }
.project-item.active {
  border-left-color: var(--accent);
  background: var(--bg);
}
.project-item .name {
  font-weight: 600;
  font-size: 0.9rem;
  margin-bottom: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.project-item .meta {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.75rem;
}
.stage-badge {
  display: inline-block;
  padding: 1px 7px;
  border-radius: 10px;
  font-size: 0.7rem;
  font-family: var(--font-mono);
  font-weight: 500;
}
.stage-badge.running { background: #FEF3E2; color: var(--warning); }
.stage-badge.done    { background: #EDF5EE; color: var(--success); }
.stage-badge.default { background: #F2EDE6; color: var(--muted); }
.iter-badge {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--muted);
}
.sidebar-empty {
  padding: 24px 16px;
  text-align: center;
  color: var(--muted);
  font-style: italic;
  font-size: 0.85rem;
}

/* ── Main Content ───────────────────────────────────────────────── */
.main {
  flex: 1;
  overflow-y: auto;
  padding: 20px 24px;
  display: flex;
  flex-direction: column;
  gap: 20px;
  min-width: 0;
}

/* ── Card ───────────────────────────────────────────────────────── */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
  transition: opacity 0.2s;
}
.card-header {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  font-family: var(--font-heading);
  font-size: 0.95rem;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 8px;
}
.card-body { padding: 16px; }

/* ── Pipeline Tracker ───────────────────────────────────────────── */
.pipeline-track {
  padding: 4px 0 0;
}
.pipeline-summary {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 14px;
  padding: 10px 14px;
  background: var(--bg);
  border-radius: var(--radius);
}
.pipeline-summary-stage {
  font-family: var(--font-heading);
  font-size: 1rem;
  font-weight: 600;
  color: var(--accent);
}
.pipeline-summary-progress {
  font-family: var(--font-mono);
  font-size: 0.8rem;
  color: var(--muted);
}
.pipeline-summary-iter {
  margin-left: auto;
  font-family: var(--font-mono);
  font-size: 0.75rem;
  background: #FEF3E2;
  color: var(--warning);
  padding: 2px 10px;
  border-radius: 10px;
  font-weight: 600;
}
.pipeline-bar {
  width: 100%;
  height: 6px;
  background: #EEEAE3;
  border-radius: 3px;
  overflow: hidden;
  margin-bottom: 16px;
}
.pipeline-bar-fill {
  height: 100%;
  border-radius: 3px;
  background: linear-gradient(90deg, var(--success), var(--accent));
  transition: width 0.5s ease;
}
.pipeline-phases {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
}
@media (max-width: 900px) {
  .pipeline-phases { grid-template-columns: repeat(2, 1fr); }
}
.pipeline-phase {
  min-width: 0;
}
.phase-label {
  font-family: var(--font-heading);
  font-size: 0.7rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--muted);
  margin-bottom: 8px;
  padding-bottom: 4px;
  border-bottom: 1px solid var(--border);
}
.phase-stages {
  display: flex;
  flex-direction: column;
  gap: 0;
}
.phase-stage {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 8px;
  border-radius: 4px;
  transition: background 0.15s;
  cursor: default;
  position: relative;
}
.phase-stage:hover {
  background: var(--bg-hover);
}
.phase-stage .stage-icon {
  width: 18px;
  height: 18px;
  border-radius: 50%;
  border: 2px solid var(--border);
  background: var(--card);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 9px;
  flex-shrink: 0;
  transition: all 0.3s;
}
.phase-stage.completed .stage-icon {
  background: var(--success);
  border-color: var(--success);
  color: #fff;
}
.phase-stage.current .stage-icon {
  width: 20px;
  height: 20px;
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
  animation: pulse-ring 2s ease-in-out infinite;
  box-shadow: 0 0 0 3px rgba(139, 58, 58, 0.15);
}
@keyframes pulse-ring {
  0%, 100% { box-shadow: 0 0 0 3px rgba(139, 58, 58, 0.15); }
  50% { box-shadow: 0 0 0 6px rgba(139, 58, 58, 0.08); }
}
.phase-stage.future .stage-icon {
  background: transparent;
  border-color: #D4CFC6;
}
.phase-stage .stage-name {
  font-family: var(--font-mono);
  font-size: 0.78rem;
  color: var(--muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.phase-stage.completed .stage-name {
  color: var(--success);
}
.phase-stage.current .stage-name {
  color: var(--accent);
  font-weight: 600;
}
.phase-stage .stage-connector {
  position: absolute;
  left: 16px;
  top: 23px;
  width: 2px;
  height: calc(100% - 13px);
}
.phase-stage:last-child .stage-connector { display: none; }
.phase-stage.completed .stage-connector { background: var(--success); }
.phase-stage.current .stage-connector {
  background: repeating-linear-gradient(
    180deg, var(--accent) 0px, var(--accent) 3px, transparent 3px, transparent 6px
  );
}
.phase-stage.future .stage-connector {
  background: repeating-linear-gradient(
    180deg, #D4CFC6 0px, #D4CFC6 3px, transparent 3px, transparent 6px
  );
}

/* ── Middle Row ─────────────────────────────────────────────────── */
.middle-row {
  display: grid;
  grid-template-columns: 3fr 2fr;
  gap: 20px;
}

/* ── Experiment Monitor ─────────────────────────────────────────── */
.exp-chips {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}
.exp-chip {
  font-family: var(--font-mono);
  font-size: 0.75rem;
  padding: 3px 10px;
  border-radius: 12px;
  background: var(--bg);
  border: 1px solid var(--border);
}
.exp-chip .num { font-weight: 700; }
.exp-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.8rem;
}
.exp-table th {
  text-align: left;
  font-weight: 600;
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--muted);
  padding: 6px 8px;
  border-bottom: 1px solid var(--border);
}
.exp-table td {
  padding: 6px 8px;
  border-bottom: 1px solid #F2EDE6;
  font-family: var(--font-mono);
  font-size: 0.78rem;
}
.exp-table tr:last-child td { border-bottom: none; }
.status-dot {
  display: inline-block;
  width: 7px; height: 7px;
  border-radius: 50%;
  margin-right: 6px;
  vertical-align: middle;
}
.status-dot.completed { background: var(--success); }
.status-dot.running   { background: var(--warning); animation: pulse-dot 1.5s ease-in-out infinite; }
.status-dot.pending   { background: #D4CFC6; }
.exp-empty {
  text-align: center;
  padding: 24px 0;
  color: var(--muted);
  font-style: italic;
  font-size: 0.85rem;
}
.exp-recovery {
  margin-top: 10px;
  font-size: 0.75rem;
  color: var(--warning);
  font-style: italic;
}

/* ── Quality Chart ──────────────────────────────────────────────── */
.chart-container {
  position: relative;
  height: 200px;
}
.chart-empty {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--muted);
  font-style: italic;
  font-size: 0.85rem;
}

/* ── File Browser ───────────────────────────────────────────────── */
.file-browser {
  display: grid;
  grid-template-columns: 30% 70%;
  height: 40vh;
  min-height: 280px;
}
.file-tree {
  border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: 8px 0;
  font-size: 0.8rem;
  font-family: var(--font-mono);
}
.tree-node {
  cursor: pointer;
  user-select: none;
}
.tree-row {
  display: flex;
  align-items: center;
  padding: 3px 8px 3px;
  transition: background 0.1s;
  white-space: nowrap;
}
.tree-row:hover { background: var(--bg-hover); }
.tree-row.active { background: #F0E8DE; }
.tree-icon { width: 18px; text-align: center; flex-shrink: 0; font-size: 0.85rem; }
.tree-name { margin-left: 4px; overflow: hidden; text-overflow: ellipsis; }
.tree-children { display: none; }
.tree-node.expanded > .tree-children { display: block; }

.file-preview {
  overflow: auto;
  padding: 12px 16px;
  font-size: 0.8rem;
  background: #FDFCFA;
}
.file-preview pre {
  white-space: pre-wrap;
  word-break: break-word;
  font-family: var(--font-mono);
  font-size: 0.78rem;
  line-height: 1.55;
}
.file-preview .json-key    { color: var(--accent); }
.file-preview .json-string { color: var(--success); }
.file-preview .json-number { color: var(--warning); }
.file-preview .json-bool   { color: #7B68AE; }
.file-preview .json-null   { color: var(--muted); }

.file-preview .md-rendered { line-height: 1.6; }
.file-preview .md-rendered h1,
.file-preview .md-rendered h2,
.file-preview .md-rendered h3 {
  font-family: var(--font-heading);
  margin: 0.8em 0 0.4em;
  color: var(--accent);
}
.file-preview .md-rendered h1 { font-size: 1.25rem; border-bottom: 1px solid var(--border); padding-bottom: 4px; }
.file-preview .md-rendered h2 { font-size: 1.1rem; }
.file-preview .md-rendered h3 { font-size: 0.95rem; }
.file-preview .md-rendered p { margin: 0.5em 0; }
.file-preview .md-rendered ul, .file-preview .md-rendered ol { padding-left: 1.5em; margin: 0.4em 0; }
.file-preview .md-rendered code {
  background: var(--bg);
  padding: 1px 5px;
  border-radius: 3px;
  font-family: var(--font-mono);
  font-size: 0.85em;
}
.file-preview .md-rendered pre code {
  display: block;
  padding: 10px;
  overflow-x: auto;
  border: 1px solid var(--border);
  border-radius: var(--radius);
}
.file-preview .md-rendered blockquote {
  border-left: 3px solid var(--accent);
  padding-left: 12px;
  color: var(--muted);
  margin: 0.5em 0;
}

.file-placeholder {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--muted);
  font-style: italic;
  font-size: 0.85rem;
}
.truncation-notice {
  margin-top: 12px;
  padding: 8px 12px;
  background: #FEF3E2;
  border-radius: var(--radius);
  color: var(--warning);
  font-size: 0.75rem;
  font-style: italic;
}

/* ── Skeleton Loading ───────────────────────────────────────────── */
.skeleton {
  background: linear-gradient(90deg, #F2EDE6 25%, #E8E0D4 50%, #F2EDE6 75%);
  background-size: 200% 100%;
  animation: skeleton-shimmer 1.5s ease-in-out infinite;
  border-radius: 4px;
}
@keyframes skeleton-shimmer {
  0%   { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}
.skeleton-line {
  height: 12px;
  margin-bottom: 8px;
  border-radius: 4px;
}
.skeleton-line:nth-child(1) { width: 90%; }
.skeleton-line:nth-child(2) { width: 70%; }
.skeleton-line:nth-child(3) { width: 80%; }

/* ── Scrollbar ──────────────────────────────────────────────────── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #D4CFC6; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #B8B0A4; }

/* ── Responsive ─────────────────────────────────────────────────── */
@media (max-width: 1200px) {
  .middle-row { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- ── Header ───────────────────────────────────────────────────── -->
<header class="header">
  <h1>Tao Research System <span>Dashboard</span></h1>
  <div class="header-right">
    <span class="header-dot"></span>
    <span id="poll-status">Polling every 5s</span>
  </div>
</header>

<!-- ── Shell ────────────────────────────────────────────────────── -->
<div class="shell">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">Projects</div>
    <div class="project-list" id="project-list"></div>
  </aside>

  <!-- Main -->
  <main class="main" id="main-content">
    <!-- Pipeline Tracker -->
    <div class="card" id="pipeline-card">
      <div class="card-header">Pipeline Tracker</div>
      <div class="card-body pipeline-track" id="pipeline-track">
        <div class="skeleton"><div class="skeleton-line"></div></div>
      </div>
    </div>

    <!-- Middle Row: Experiments + Quality -->
    <div class="middle-row">
      <div class="card" id="experiment-card">
        <div class="card-header">Experiments</div>
        <div class="card-body" id="experiment-body">
          <div class="skeleton"><div class="skeleton-line"></div><div class="skeleton-line"></div><div class="skeleton-line"></div></div>
        </div>
      </div>
      <div class="card" id="quality-card">
        <div class="card-header">Quality Trajectory</div>
        <div class="card-body">
          <div class="chart-container" id="chart-container">
            <canvas id="quality-chart"></canvas>
            <div class="chart-empty" id="chart-empty">No quality data yet</div>
          </div>
        </div>
      </div>
    </div>

    <!-- File Browser -->
    <div class="card" id="filebrowser-card">
      <div class="card-header">File Browser</div>
      <div class="file-browser">
        <div class="file-tree" id="file-tree">
          <div class="skeleton" style="margin:12px"><div class="skeleton-line"></div><div class="skeleton-line"></div><div class="skeleton-line"></div></div>
        </div>
        <div class="file-preview" id="file-preview">
          <div class="file-placeholder">Select a file to preview</div>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
// ── Constants ──────────────────────────────────────────────────────
const PIPELINE_STAGES = [
  "init", "literature_search", "idea_debate", "planning", "pilot_experiments",
  "idea_validation_decision", "experiment_cycle", "result_debate",
  "experiment_decision", "writing_outline", "writing_assets", "writing_sections",
  "writing_integrate", "writing_teaser", "writing_final_review", "writing_latex",
  "review", "reflection", "quality_gate", "done"
];

const STAGE_LABELS = {
  "init": "Init",
  "literature_search": "Literature Search",
  "idea_debate": "Idea Debate",
  "planning": "Planning",
  "pilot_experiments": "Pilot Experiments",
  "idea_validation_decision": "Idea Validation",
  "experiment_cycle": "Experiment Cycle",
  "result_debate": "Result Debate",
  "experiment_decision": "Experiment Decision",
  "writing_outline": "Outline",
  "writing_assets": "Generate Assets",
  "writing_sections": "Write Sections",
  "writing_integrate": "Integrate",
  "writing_final_review": "Final Review",
  "writing_teaser": "Teaser Figure",
  "writing_latex": "LaTeX Compile",
  "review": "Peer Review",
  "reflection": "Reflection",
  "quality_gate": "Quality Gate",
  "done": "Done",
};

const PIPELINE_PHASES = [
  { name: "Research", stages: ["init", "literature_search", "idea_debate", "planning"] },
  { name: "Experiments", stages: ["pilot_experiments", "idea_validation_decision", "experiment_cycle", "result_debate", "experiment_decision"] },
  { name: "Writing", stages: ["writing_outline", "writing_assets", "writing_sections", "writing_integrate", "writing_teaser", "writing_final_review", "writing_latex"] },
  { name: "Review", stages: ["review", "reflection", "quality_gate", "done"] },
];

const AUTO_EXPAND = new Set(["writing", "plan", "exp"]);
const MAX_PREVIEW_LINES = 500;
const POLL_INTERVAL = 5000;

// ── State ──────────────────────────────────────────────────────────
let state = {
  projects: [],
  activeProject: null,
  dashboard: null,
  experiments: null,
  tree: null,
  selectedFile: null,
  qualityChart: null,
  pollTimer: null,
};

// ── API Helpers ────────────────────────────────────────────────────
async function api(path) {
  try {
    const resp = await fetch(path);
    if (!resp.ok) return null;
    const ct = resp.headers.get("content-type") || "";
    if (ct.includes("application/json")) return resp.json();
    return resp.text();
  } catch {
    return null;
  }
}

// ── Render: Sidebar ────────────────────────────────────────────────
function renderSidebar() {
  const el = document.getElementById("project-list");
  if (!state.projects.length) {
    el.innerHTML = '<div class="sidebar-empty">No projects found</div>';
    return;
  }
  el.innerHTML = state.projects.map(p => {
    const active = state.activeProject === p.name ? " active" : "";
    const badgeClass = p.stage === "done" ? "done" : (
      ["init", "unknown"].includes(p.stage) ? "default" : "running"
    );
    return `
      <div class="project-item${active}" data-name="${esc(p.name)}">
        <div class="name">${esc(p.name)}</div>
        <div class="meta">
          <span class="stage-badge ${badgeClass}">${esc(p.stage)}</span>
          <span class="iter-badge">iter ${p.iteration || 0}</span>
        </div>
      </div>`;
  }).join("");

  el.querySelectorAll(".project-item").forEach(item => {
    item.addEventListener("click", () => selectProject(item.dataset.name));
  });
}

// ── Render: Pipeline ───────────────────────────────────────────────
function renderPipeline(currentStage, iteration) {
  const track = document.getElementById("pipeline-track");
  const currentIdx = PIPELINE_STAGES.indexOf(currentStage);
  const total = PIPELINE_STAGES.length;
  const completedCount = currentStage === "done" ? total : Math.max(0, currentIdx);
  const pct = Math.round((completedCount / (total - 1)) * 100);

  let html = '';

  // Summary bar
  html += '<div class="pipeline-summary">';
  html += `<div class="pipeline-summary-stage">${esc(STAGE_LABELS[currentStage] || currentStage)}</div>`;
  html += `<div class="pipeline-summary-progress">${completedCount} / ${total - 1} stages</div>`;
  if (iteration > 0) {
    html += `<div class="pipeline-summary-iter">Iteration ${iteration}</div>`;
  }
  html += '</div>';

  // Progress bar
  html += '<div class="pipeline-bar">';
  html += `<div class="pipeline-bar-fill" style="width:${pct}%"></div>`;
  html += '</div>';

  // Phase grid
  html += '<div class="pipeline-phases">';
  PIPELINE_PHASES.forEach(phase => {
    html += '<div class="pipeline-phase">';
    html += `<div class="phase-label">${esc(phase.name)}</div>`;
    html += '<div class="phase-stages">';
    phase.stages.forEach(stage => {
      const idx = PIPELINE_STAGES.indexOf(stage);
      const isDone = currentStage === "done";
      const status = isDone ? "completed"
                   : idx < currentIdx ? "completed"
                   : idx === currentIdx ? "current"
                   : "future";
      const icon = status === "completed" ? "&#10003;" : "";
      html += `<div class="phase-stage ${status}">`;
      html += `<div class="stage-icon">${icon}</div>`;
      html += `<div class="stage-name">${esc(STAGE_LABELS[stage] || stage)}</div>`;
      html += '<div class="stage-connector"></div>';
      html += '</div>';
    });
    html += '</div></div>';
  });
  html += '</div>';

  track.innerHTML = html;
}

// ── Render: Experiments ────────────────────────────────────────────
function renderExperiments(dashboard, experiments) {
  const body = document.getElementById("experiment-body");
  const progress = dashboard?.experiment_progress || { total: 0, completed: 0, running: 0 };
  const pending = progress.total - progress.completed - progress.running;
  const recoveryEvents = dashboard?.experiment_state?.recovery_events || 0;

  // If we have no tasks and stage is early
  const stage = dashboard?.status?.stage || "init";
  const stageIdx = PIPELINE_STAGES.indexOf(stage);
  const pilotIdx = PIPELINE_STAGES.indexOf("pilot_experiments");
  if (progress.total === 0 && stageIdx < pilotIdx) {
    body.innerHTML = '<div class="exp-empty">Experiments begin at pilot stage</div>';
    return;
  }

  let html = '<div class="exp-chips">';
  html += chip("total", progress.total);
  html += chip("completed", progress.completed);
  html += chip("running", progress.running);
  html += chip("pending", Math.max(0, pending));
  html += "</div>";

  // Render task table from experiments endpoint if available
  const tasks = experiments?.tasks;
  if (tasks && tasks.length > 0) {
    html += '<table class="exp-table"><thead><tr><th>Task ID</th><th>Status</th><th>Dependencies</th></tr></thead><tbody>';
    const completedIds = new Set(experiments.completed_ids || []);
    const runningIds = new Set(experiments.running_ids || []);
    tasks.forEach(t => {
      let taskStatus, dotClass;
      if (completedIds.has(t.id)) { taskStatus = "completed"; dotClass = "completed"; }
      else if (runningIds.has(t.id)) { taskStatus = "running"; dotClass = "running"; }
      else { taskStatus = "pending"; dotClass = "pending"; }
      const deps = (t.depends_on && t.depends_on.length) ? t.depends_on.join(", ") : "--";
      html += `<tr>
        <td>${esc(t.id)}</td>
        <td><span class="status-dot ${dotClass}"></span>${taskStatus}</td>
        <td>${esc(deps)}</td>
      </tr>`;
    });
    html += "</tbody></table>";
  } else if (progress.total > 0) {
    // Fallback: generate synthetic rows from progress counts
    html += '<table class="exp-table"><thead><tr><th>Task ID</th><th>Status</th><th>Dependencies</th></tr></thead><tbody>';
    for (let i = 0; i < progress.completed; i++) {
      html += `<tr><td>task_${i}</td><td><span class="status-dot completed"></span>completed</td><td>--</td></tr>`;
    }
    for (let i = 0; i < progress.running; i++) {
      html += `<tr><td>task_${progress.completed + i}</td><td><span class="status-dot running"></span>running</td><td>--</td></tr>`;
    }
    for (let i = 0; i < Math.max(0, pending); i++) {
      html += `<tr><td>task_${progress.completed + progress.running + i}</td><td><span class="status-dot pending"></span>pending</td><td>--</td></tr>`;
    }
    html += "</tbody></table>";
  } else {
    html += '<div class="exp-empty">No experiment tasks defined</div>';
  }

  if (recoveryEvents > 0) {
    html += `<div class="exp-recovery">${recoveryEvents} recovery event${recoveryEvents > 1 ? "s" : ""} recorded</div>`;
  }
  body.innerHTML = html;
}

function chip(label, num) {
  return `<span class="exp-chip"><span class="num">${num}</span> ${label}</span>`;
}

// ── Render: Quality Chart ──────────────────────────────────────────
function renderQualityChart(scores) {
  const emptyEl = document.getElementById("chart-empty");
  const canvas = document.getElementById("quality-chart");

  if (!scores || scores.length === 0) {
    emptyEl.style.display = "flex";
    canvas.style.display = "none";
    if (state.qualityChart) { state.qualityChart.destroy(); state.qualityChart = null; }
    return;
  }

  emptyEl.style.display = "none";
  canvas.style.display = "block";

  const labels = scores.map((_, i) => `${i + 1}`);
  const data = {
    labels,
    datasets: [{
      label: "Quality Score",
      data: scores,
      borderColor: "#8B3A3A",
      backgroundColor: (ctx) => {
        const chart = ctx.chart;
        const { ctx: c, chartArea } = chart;
        if (!chartArea) return "rgba(139,58,58,0.1)";
        const grad = c.createLinearGradient(0, chartArea.top, 0, chartArea.bottom);
        grad.addColorStop(0, "rgba(139,58,58,0.25)");
        grad.addColorStop(1, "rgba(139,58,58,0.02)");
        return grad;
      },
      fill: true,
      tension: 0.3,
      pointBackgroundColor: "#8B3A3A",
      pointRadius: 4,
      pointHoverRadius: 6,
      borderWidth: 2,
    }]
  };

  const options = {
    responsive: true,
    maintainAspectRatio: false,
    scales: {
      y: {
        min: 0, max: 10,
        grid: { color: "#F2EDE6" },
        ticks: {
          font: { family: "'SF Mono', monospace", size: 10 },
          color: "#9A9488",
        },
        title: { display: true, text: "Score", font: { family: "Georgia, serif", size: 12 }, color: "#9A9488" },
      },
      x: {
        grid: { display: false },
        ticks: {
          font: { family: "'SF Mono', monospace", size: 10 },
          color: "#9A9488",
        },
        title: { display: true, text: "Iteration", font: { family: "Georgia, serif", size: 12 }, color: "#9A9488" },
      }
    },
    plugins: {
      legend: { display: false },
      annotation: undefined,
    },
    animation: { duration: 400 },
  };

  if (state.qualityChart) {
    state.qualityChart.data = data;
    state.qualityChart.options = options;
    state.qualityChart.update();
  } else {
    // Add quality gate line plugin
    const qualityGatePlugin = {
      id: "qualityGateLine",
      afterDraw(chart) {
        const yScale = chart.scales.y;
        const ctx = chart.ctx;
        const y = yScale.getPixelForValue(8.0);
        ctx.save();
        ctx.setLineDash([6, 4]);
        ctx.strokeStyle = "#C4903D";
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(chart.chartArea.left, y);
        ctx.lineTo(chart.chartArea.right, y);
        ctx.stroke();
        // Label
        ctx.fillStyle = "#C4903D";
        ctx.font = "10px 'SF Mono', monospace";
        ctx.textAlign = "right";
        ctx.fillText("Quality Gate: 8.0", chart.chartArea.right, y - 5);
        ctx.restore();
      }
    };
    state.qualityChart = new Chart(canvas, { type: "line", data, options, plugins: [qualityGatePlugin] });
  }
}

// ── Render: File Tree ──────────────────────────────────────────────
function renderFileTree(treeData) {
  const el = document.getElementById("file-tree");
  if (!treeData || treeData.length === 0) {
    el.innerHTML = '<div class="file-placeholder">No files available</div>';
    return;
  }
  el.innerHTML = buildTreeHTML(treeData, 0, "");
  attachTreeEvents(el);
}

function buildTreeHTML(nodes, depth, parentPath) {
  let html = "";
  const sorted = [...nodes].sort((a, b) => {
    if (a.type !== b.type) return a.type === "dir" ? -1 : 1;
    return a.name.localeCompare(b.name);
  });
  sorted.forEach(node => {
    const fullPath = parentPath ? `${parentPath}/${node.name}` : node.name;
    const isDir = node.type === "dir";
    const icon = isDir ? "\uD83D\uDCC1" : "\uD83D\uDCC4";
    const indent = depth * 16;
    const autoExpand = depth === 0 && AUTO_EXPAND.has(node.name);
    const expandedClass = autoExpand ? " expanded" : "";

    html += `<div class="tree-node${expandedClass}" data-path="${esc(fullPath)}" data-type="${node.type}">`;
    html += `<div class="tree-row" style="padding-left:${8 + indent}px">`;
    html += `<span class="tree-icon">${icon}</span>`;
    html += `<span class="tree-name">${esc(node.name)}</span>`;
    html += "</div>";
    if (isDir && node.children && node.children.length > 0) {
      html += `<div class="tree-children">${buildTreeHTML(node.children, depth + 1, fullPath)}</div>`;
    }
    html += "</div>";
  });
  return html;
}

function attachTreeEvents(root) {
  root.querySelectorAll(".tree-row").forEach(row => {
    row.addEventListener("click", (e) => {
      e.stopPropagation();
      const node = row.closest(".tree-node");
      const type = node.dataset.type;
      const path = node.dataset.path;

      if (type === "dir") {
        node.classList.toggle("expanded");
      } else {
        // Deselect previous
        root.querySelectorAll(".tree-row.active").forEach(r => r.classList.remove("active"));
        row.classList.add("active");
        loadFilePreview(path);
      }
    });
  });
}

// ── File Preview ───────────────────────────────────────────────────
async function loadFilePreview(filePath) {
  const el = document.getElementById("file-preview");
  if (!state.activeProject) return;

  el.innerHTML = '<div class="file-placeholder">Loading...</div>';
  state.selectedFile = filePath;

  const content = await api(`/api/project/${encodeURIComponent(state.activeProject)}/files/${encodeURIComponent(filePath)}`);
  if (state.selectedFile !== filePath) return; // stale

  if (content === null) {
    el.innerHTML = '<div class="file-placeholder">Unable to load file</div>';
    return;
  }

  const ext = filePath.split(".").pop().toLowerCase();
  let displayContent;
  let truncated = false;

  if (typeof content === "object") {
    // JSON object returned from API
    displayContent = renderJSON(content);
  } else if (ext === "md") {
    const lines = content.split("\n");
    if (lines.length > MAX_PREVIEW_LINES) {
      truncated = true;
      displayContent = renderMarkdown(lines.slice(0, MAX_PREVIEW_LINES).join("\n"));
    } else {
      displayContent = renderMarkdown(content);
    }
  } else {
    const lines = content.split("\n");
    if (lines.length > MAX_PREVIEW_LINES) {
      truncated = true;
      displayContent = `<pre>${esc(lines.slice(0, MAX_PREVIEW_LINES).join("\n"))}</pre>`;
    } else {
      displayContent = `<pre>${esc(content)}</pre>`;
    }
  }

  el.innerHTML = displayContent;
  if (truncated) {
    el.innerHTML += `<div class="truncation-notice">Showing first ${MAX_PREVIEW_LINES} lines. File has been truncated.</div>`;
  }
}

// ── JSON Syntax Highlighting ───────────────────────────────────────
function renderJSON(obj) {
  const raw = JSON.stringify(obj, null, 2);
  const highlighted = raw.replace(
    /("(?:[^"\\]|\\.)*")\s*:/g,
    '<span class="json-key">$1</span>:'
  ).replace(
    /:\s*("(?:[^"\\]|\\.)*")/g,
    ': <span class="json-string">$1</span>'
  ).replace(
    /:\s*(-?\d+\.?\d*(?:[eE][+-]?\d+)?)/g,
    ': <span class="json-number">$1</span>'
  ).replace(
    /:\s*(true|false)/g,
    ': <span class="json-bool">$1</span>'
  ).replace(
    /:\s*(null)/g,
    ': <span class="json-null">$1</span>'
  );
  return `<pre>${highlighted}</pre>`;
}

// ── Minimal Markdown Renderer ──────────────────────────────────────
function renderMarkdown(text) {
  let html = esc(text);

  // Code blocks (fenced)
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');

  // Headers
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');

  // Bold and italic
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');

  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

  // Blockquotes
  html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');

  // Unordered lists
  html = html.replace(/^[-*] (.+)$/gm, '<li>$1</li>');
  html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');

  // Line breaks to paragraphs
  html = html.replace(/\n\n+/g, '</p><p>');
  html = '<p>' + html + '</p>';

  // Clean up empty paragraphs
  html = html.replace(/<p>\s*<\/p>/g, '');
  html = html.replace(/<p>(<h[1-3]>)/g, '$1');
  html = html.replace(/(<\/h[1-3]>)<\/p>/g, '$1');
  html = html.replace(/<p>(<pre>)/g, '$1');
  html = html.replace(/(<\/pre>)<\/p>/g, '$1');
  html = html.replace(/<p>(<ul>)/g, '$1');
  html = html.replace(/(<\/ul>)<\/p>/g, '$1');
  html = html.replace(/<p>(<blockquote>)/g, '$1');
  html = html.replace(/(<\/blockquote>)<\/p>/g, '$1');

  return `<div class="md-rendered">${html}</div>`;
}

// ── Escape HTML ────────────────────────────────────────────────────
function esc(str) {
  if (typeof str !== "string") str = String(str ?? "");
  const d = document.createElement("div");
  d.textContent = str;
  return d.innerHTML;
}

// ── Project Selection ──────────────────────────────────────────────
async function selectProject(name) {
  if (state.activeProject === name) return;
  state.activeProject = name;
  state.selectedFile = null;

  // Clear preview
  document.getElementById("file-preview").innerHTML = '<div class="file-placeholder">Select a file to preview</div>';

  // Update sidebar highlight
  renderSidebar();

  // Show loading skeletons
  showSkeletons();

  // Fetch all project data
  await refreshProjectData();
}

function showSkeletons() {
  document.getElementById("pipeline-track").innerHTML = '<div class="skeleton"><div class="skeleton-line" style="width:100%;height:24px"></div></div>';
  document.getElementById("experiment-body").innerHTML = '<div class="skeleton"><div class="skeleton-line"></div><div class="skeleton-line"></div><div class="skeleton-line"></div></div>';
  document.getElementById("file-tree").innerHTML = '<div class="skeleton" style="margin:12px"><div class="skeleton-line"></div><div class="skeleton-line"></div><div class="skeleton-line"></div></div>';
}

// ── Data Refresh ───────────────────────────────────────────────────
async function refreshProjectData() {
  const name = state.activeProject;
  if (!name) return;

  const [dashboard, experiments, tree] = await Promise.all([
    api(`/api/project/${encodeURIComponent(name)}/dashboard`),
    api(`/api/project/${encodeURIComponent(name)}/experiments`),
    api(`/api/project/${encodeURIComponent(name)}/tree`),
  ]);

  // Guard against stale responses if user switched projects
  if (state.activeProject !== name) return;

  state.dashboard = dashboard;
  state.experiments = experiments;
  state.tree = tree;

  const currentStage = dashboard?.status?.stage || "unknown";
  const iteration = dashboard?.status?.iteration || 0;

  renderPipeline(currentStage, iteration);
  renderExperiments(dashboard, experiments);
  renderQualityChart(dashboard?.quality_scores);
  renderFileTree(Array.isArray(tree) ? tree : []);
}

// ── Polling ────────────────────────────────────────────────────────
function startPolling() {
  stopPolling();
  state.pollTimer = setInterval(async () => {
    // Refresh project list
    const projects = await api("/api/projects");
    if (projects && Array.isArray(projects)) {
      state.projects = projects;
      renderSidebar();
    }
    // Refresh active project data
    if (state.activeProject) {
      await refreshProjectData();
    }
  }, POLL_INTERVAL);
}

function stopPolling() {
  if (state.pollTimer) {
    clearInterval(state.pollTimer);
    state.pollTimer = null;
  }
}

// ── Init ───────────────────────────────────────────────────────────
async function init() {
  const projects = await api("/api/projects");
  if (projects && Array.isArray(projects)) {
    state.projects = projects;
  }
  renderSidebar();

  if (state.projects.length > 0) {
    await selectProject(state.projects[0].name);
  } else {
    // Show empty state in main area
    document.getElementById("pipeline-track").innerHTML = '<div class="exp-empty">Select or create a project to begin</div>';
    document.getElementById("experiment-body").innerHTML = '';
    document.getElementById("file-tree").innerHTML = '<div class="file-placeholder">No project selected</div>';
  }

  startPolling();
}

// Kick off
document.addEventListener("DOMContentLoaded", init);
</script>
